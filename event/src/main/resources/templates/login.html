<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Event Management System</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- ========== NAVBAR ========== -->
<nav class="navbar">
    <a href="/" class="nav-brand">
        <img src="/images/logo2.png" alt="Logo" onerror="this.style.display='none'"/>
        <div class="nav-brand-text">
            <div class="title">University of Ruhuna</div>
            <div class="sub">Faculty of Technology</div>
        </div>
    </a>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/register" class="btn-nav-login">Register</a></li>
    </ul>
</nav>

<!-- ========== LOGIN SECTION ========== -->
<section class="section">
    <div class="container" style="max-width:420px;">
        <h2 class="section-title">Welcome Back</h2>
        <div class="divider"></div>
        <p class="section-subtitle">Login to manage your events and bookings</p>

        <!-- ERROR MESSAGE -->
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-danger" id="errorMessage" style="display:none;">
            <span>Invalid email or password. Please try again.</span>
        </div>

        <!-- FORM -->
        <form id="loginForm" class="form-card">
            <div class="form-group">
                <label class="form-label">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <div style="margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                    Login
                </button>
            </div>

            <div style="margin-top:1rem; text-align:center;">
                <p>Don't have an account? <a href="/register" style="color:#4a6f8f;">Register now</a></p>
            </div>
        </form>
    </div>
</section>

<!-- ========== FOOTER ========== -->
<footer>
    <p>© 2026 <strong>University of Ruhuna</strong> | Faculty of Technology — Event Management System</p>
</footer>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        fetch('/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
                'email': email,
                'password': password
            })
        })
            .then(response => {
                if (response.redirected) {
                    // Login successful - follow the redirect URL from backend
                    window.location.href = response.url;
                } else {
                    // Login failed - show error
                    errorMessage.style.display = 'block';
                    setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
                }
            })
            .catch(error => {
                errorMessage.style.display = 'block';
                setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
            });
    });
</script>

</body>
</html>
