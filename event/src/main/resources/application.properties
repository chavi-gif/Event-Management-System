# ============================================================
#  Event Management System - MySQL Configuration (XAMPP)
# ============================================================

# ---- Server ----
server.port=8080

# ---- MySQL Database (XAMPP) ----
spring.datasource.url=jdbc:mysql://localhost:3306/eventdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Initialize Sample Data (Run data.sql ONLY ONCE - now disabled) ----
spring.sql.init.mode=never
# spring.sql.init.data-locations=classpath:data.sql
# spring.jpa.defer-datasource-initialization=true

# ---- File Upload Settings ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ---- Thymeleaf ----
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ---- CORS ----
spring.web.cors.allowed-origins=*